# General configuration
general:
  run_name: "generation_vllm_longform_qa_qwen3_14b_random_5000"

# Model configuration
model:
  name: "Qwen/Qwen3-14B"
  kwargs:
    dtype: "float16"
    tensor_parallel_size: 1

# Generation parameters
generation:
  max_samples: null
  kwargs:
    n: 5
  chat_template_kwargs:
    enable_thinking: false

# File configuration
file:
  root_dir: "PUPPET/experimental"
  input:
    use_custom_dataset: true
    custom_dataset: "dpo_data/data/eli5_preprocessed_202510281307_random_5000"
    benchmark: "waterbench"
    dataset: "longform_qa"
  output:
    path: "vllm_gen/data"
