# General configuration
general:
  run_name: "generation_vllm_outfox_qwen3_dpo_baseline_wo_chat"

# Model configuration
model:
  name: "Qwen/Qwen3-8B"
  kwargs:
    dtype: "float16"
    tensor_parallel_size: 1

# Generation parameters
generation:
  max_samples: null
  use_chat_template: false
  kwargs:
    n: 1
  chat_template_kwargs:
    enable_thinking: false

# File configuration
file:
  root_dir: "PUPPET/experimental"
  input:
    use_custom_dataset: true
    custom_dataset: "dpo_data/data/outfox_preprocessed_random_200_test_202512161348"
    benchmark: "outfox"
    dataset: "outfox"
  output:
    path: "vllm_gen/data"