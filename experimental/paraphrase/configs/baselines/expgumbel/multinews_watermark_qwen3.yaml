# General configuration
general:
  run_name: "paraphrase_watermark_multi_news_qwen3_expgumbel"

# Paraphrase configuration
paraphrase:
  model_kwargs:
    dtype: "float16"
  generation_kwargs:
    lex_diversity: 60
    order_diversity: 60
    do_sample: true
    top_p: 0.75
    top_k: null
    max_length: 512
  preprocess:
    - name: "extract_answer_with_regex"
      kwargs:
        full_output_field: "watermarked_model_output"
        regex_pattern: 'assistant\s*\n<think>\s*\n\s*</think>\s*\n\s*(.*)$'
  max_samples: null

# File configuration
file:
  root_dir: "PUPPET/experimental"
  generation:
    path: "watermark_gen/data/baselines/expgumbel/generation_watermark_multi_news_qwen3_expgumbel_2026_0129_161940.jsonl"
    field: "watermarked_model_output"
  output:
    path: "paraphrase/results"