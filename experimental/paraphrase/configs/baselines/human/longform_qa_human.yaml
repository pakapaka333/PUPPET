# General configuration
general:
  run_name: "paraphrase_longform_qa_human"

# Paraphrase configuration
paraphrase:
  model_kwargs:
    dtype: "float16"
  generation_kwargs:
    lex_diversity: 60
    order_diversity: 60
    do_sample: true
    top_p: 0.75
    top_k: null
    max_length: 512
  preprocess: []
  max_samples: null

# File configuration
file:
  root_dir: "PUPPET/experimental"
  generation:
    path: "submodules/WaterBench/data/WaterBench/2-1_longform_qa.jsonl"
    field: "outputs"
  output:
    path: "paraphrase/results"