# General configuration
general:
  run_name: "evaluation_watermark_longform_qa_qwen3_synthid"

# Evaluation configuration
evaluation:
  metrics:
    rouge_score_waterbench:
      reference:
        path: "watermark_gen/data/baselines/synthid/generation_watermark_longform_qa_qwen3_2025_1220_161844_synthid.jsonl"
        field: "outputs"
  preprocess:
    - name: "extract_answer_with_regex"
      kwargs:
        full_output_field: "watermarked_model_output"
        regex_pattern: 'assistant\s*\n<think>\s*\n\s*</think>\s*\n\s*(.*)$'
  max_samples: null

# File configuration
file:
  root_dir: "PUPPET/experimental"
  generation:
    path: "watermark_gen/data/baselines/synthid/generation_watermark_longform_qa_qwen3_2025_1220_161844_synthid.jsonl"
    field: "watermarked_model_output"
  output:
    path: "evaluation/results"